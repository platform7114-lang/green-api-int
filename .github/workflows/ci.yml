name: CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: [ self-hosted, linux, X64 ]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t ghcr.io/platform7114-lang/green-api-int:${{ github.sha }} .

      - name: Login to GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u platform7114-lang --password-stdin

      - name: Push image
        run: |
          docker push ghcr.io/platform7114-lang/green-api-int:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config

      - name: Deploy
        run: |
          kubectl apply -f k8s/