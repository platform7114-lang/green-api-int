<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>API Panel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  
  <!-- Левая часть -->
  <div class="left">

    <input id="idInstance" placeholder="idInstance">
    <input id="apiToken" placeholder="ApiTokenInstance">

    <button onclick="getSettings()">getSettings</button>
    <button onclick="getState()">getStateInstance</button>

    <input id="phone" placeholder="77771234567">
    <textarea id="message">Hello World!</textarea>
    <button onclick="sendMessage()">sendMessage</button>

    <input id="phoneFile" placeholder="77771234567">
    <input id="fileUrl" placeholder="https://my.site.com/img/horse.png">
    <button onclick="sendFile()">sendFileByUrl</button>

  </div>

  <!-- Правая часть -->
  <div class="right">
    <h3>Ответ:</h3>
    <pre id="response"></pre>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
